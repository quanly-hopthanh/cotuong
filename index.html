<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Lưu Cờ Tướng - Ngọc Lâm Thách Đấu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
            margin-top: 20px;
        }
        .khung_bao_ngoai {
            background-color: #faf0e6; 
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-radius: 8px;
            border: 1px solid #8b4513;
        }
        .mat_phang_lon {
            display: grid;
            grid-template-columns: repeat(9, 60px);
            grid-template-rows: repeat(10, 60px);
            background-color: transparent;
            position: relative; 
            width: 540px;
            height: 600px;
        }
        .duong_ke_vec_to {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .o_vuong_nho {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 1; 
        }
        .cuc_tron_co {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 30px;
            font-family: "SimSun", "HanWangYen", serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            user-select: none;
            transition: all 0.2s ease;
        }
        /* PHONG CÁCH QUÂN CỜ CỦA THẦY: ĐỎ-VÀNG & ĐEN-TRẮNG */
        .phe_den { background-color: #1a1a1a; color: #ffffff; border: 2px solid #555; } 
        .phe_do { background-color: #b30000; color: #ffd700; border: 2px solid #8b0000; } 
        
        .dang_duoc_chon { transform: scale(1.1); box-shadow: 0 0 20px #2ecc71; border-color: #2ecc71; }
        .khu_vuc_thong_bao { margin-bottom: 25px; font-size: 28px; font-weight: bold; color: #2c3e50; text-transform: uppercase; text-align: center; }
        
        #nut_reset {
            margin-top: 25px;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(to bottom, #27ae60, #1e8449);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #nut_reset:hover { background-color: #219150; }
    </style>
</head>
<body>

    <div class="khu_vuc_thong_bao" id="dong_chu_bao_cao">Lượt của: Người chơi (Đen)</div>
    
    <div class="khung_bao_ngoai">
        <div class="mat_phang_lon" id="vung_ve_hinh"></div>
    </div>
    
    <button id="nut_reset" onclick="khoi_tao_lai()">Bắt đầu ván mới</button>

    <script>
        // ==========================================
        // KHỐI 1: CẤU HÌNH VÀ BỐ CỤC
        // ==========================================
        const tu_dien_chu_han = {
            "D_Xe": "俥", "D_Ma": "傌", "D_Tuong": "相", "D_Si": "仕", "D_Vua": "帥", "D_Phao": "炮", "D_Tot": "兵",
            "X_Xe": "車", "X_Ma": "馬", "X_Tuong": "象", "X_Si": "士", "X_Vua": "將", "X_Phao": "砲", "X_Tot": "卒"
        };

        const gia_tri_quan = { "Xe": 900, "Phao": 450, "Ma": 400, "Tuong": 200, "Si": 200, "Tot": 100, "Vua": 20000 };

        let mang_co = [];
        let luot_di = "X"; 
        let h_chon = -1, c_chon = -1;
        let game_over = false;

        function khoi_tao_lai() {
            mang_co = [
                ["D_Xe", "D_Ma", "D_Tuong", "D_Si", "D_Vua", "D_Si", "D_Tuong", "D_Ma", "D_Xe"],
                ["", "", "", "", "", "", "", "", ""],
                ["", "D_Phao", "", "", "", "", "", "D_Phao", ""],
                ["D_Tot", "", "D_Tot", "", "D_Tot", "", "D_Tot", "", "D_Tot"],
                ["", "", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", "", ""],
                ["X_Tot", "", "X_Tot", "", "X_Tot", "", "X_Tot", "", "X_Tot"],
                ["", "X_Phao", "", "", "", "", "", "X_Phao", ""],
                ["", "", "", "", "", "", "", "", ""],
                ["X_Xe", "X_Ma", "X_Tuong", "X_Si", "X_Vua", "X_Si", "X_Tuong", "X_Ma", "X_Xe"]
            ];
            luot_di = "X"; game_over = false;
            h_chon = -1; c_chon = -1;
            document.getElementById("nut_reset").style.display = "none";
            ve_ban_co();
        }

        // ==========================================
        // KHỐI 2: LUẬT CHƠI VÀ KIỂM TRA CHIẾU BÍ
        // ==========================================
        function dem_vat_can(ban_co, h1, c1, h2, c2) {
            let n = 0;
            if (h1 === h2) {
                for (let c = Math.min(c1, c2) + 1; c < Math.max(c1, c2); c++) if (ban_co[h1][c] !== "") n++;
            } else if (c1 === c2) {
                for (let h = Math.min(h1, h2) + 1; h < Math.max(h1, h2); h++) if (ban_co[h][c1] !== "") n++;
            }
            return n;
        }

        function xet_luat_di(ban_co, hg, cg, hd, cd, phe) {
            let qg = ban_co[hg][cg];
            let qd = ban_co[hd][cd];
            if (qd !== "" && qd.startsWith(phe)) return false;

            let l = qg.substring(2);
            let kh = Math.abs(hd - hg);
            let kc = Math.abs(cd - cg);

            switch(l) {
                case "Xe": return (kh === 0 || kc === 0) && dem_vat_can(ban_co, hg, cg, hd, cd) === 0;
                case "Phao": 
                    let v = dem_vat_can(ban_co, hg, cg, hd, cd);
                    return (kh === 0 || kc === 0) && ((qd === "" && v === 0) || (qd !== "" && v === 1));
                case "Ma":
                    if (kh === 2 && kc === 1 && ban_co[hg + (hd-hg)/2][cg] === "") return true;
                    if (kh === 1 && kc === 2 && ban_co[hg][cg + (cd-cg)/2] === "") return true;
                    return false;
                case "Tuong":
                    if (kh === 2 && kc === 2) {
                        if ((phe === "X" && hd < 5) || (phe === "D" && hd > 4)) return false;
                        return ban_co[hg + (hd-hg)/2][cg + (cd-cg)/2] === "";
                    }
                    return false;
                case "Si": return kh === 1 && kc === 1 && cd >= 3 && cd <= 5 && ((phe === "X" && hd >= 7) || (phe === "D" && hd <= 2));
                case "Vua": return (kh + kc === 1) && cd >= 3 && cd <= 5 && ((phe === "X" && hd >= 7) || (phe === "D" && hd <= 2));
                case "Tot":
                    let t = (phe === "X") ? -1 : 1;
                    if (hd - hg === t && kc === 0) return true;
                    let s = (phe === "X") ? (hg <= 4) : (hg >= 5);
                    return s && kh === 0 && kc === 1;
            }
            return false;
        }

        function nuoc_di_hop_le(ban_co, hg, cg, hd, cd, phe) {
            if (!xet_luat_di(ban_co, hg, cg, hd, cd, phe)) return false;
            let gia_lap = JSON.parse(JSON.stringify(ban_co));
            gia_lap[hd][cd] = gia_lap[hg][cg]; gia_lap[hg][cg] = "";
            
            // Chống lộ mặt tướng
            let hd_v = -1, cd_v = -1, hx_v = -1, cx_v = -1;
            for(let h=0; h<10; h++) for(let c=3; c<=5; c++) {
                if(gia_lap[h][c] === "D_Vua") { hd_v=h; cd_v=c; }
                if(gia_lap[h][c] === "X_Vua") { hx_v=h; cx_v=c; }
            }
            if(cd_v === cx_v && dem_vat_can(gia_lap, hd_v, cd_v, hx_v, cx_v) === 0) return false;

            // Kiểm tra bị chiếu
            let dich = (phe === "X") ? "D" : "X";
            let hv = -1, cv = -1;
            for(let h=0; h<10; h++) for(let c=0; c<9; c++) if(gia_lap[h][c] === phe+"_Vua") { hv=h; cv=c; }
            for(let h=0; h<10; h++) for(let c=0; c<9; c++) if(gia_lap[h][c].startsWith(dich)) 
                if(xet_luat_di(gia_lap, h, c, hv, cv, dich)) return false;
            return true;
        }

        function tim_moi_nuoc_di(ban_co, phe) {
            let ds = [];
            for(let hg=0; hg<10; hg++) for(let cg=0; cg<9; cg++) if(ban_co[hg][cg].startsWith(phe))
                for(let hd=0; hd<10; hd++) for(let cd=0; cd<9; cd++) 
                    if(nuoc_di_hop_le(ban_co, hg, cg, hd, cd, phe)) ds.push({hg, cg, hd, cd});
            return ds;
        }

        // ==========================================
        // KHỐI 3: TRÍ TUỆ NHÂN TẠO (AI)
        // ==========================================
        function ai_lam_viec() {
            if (game_over) return;
            let ds = tim_moi_nuoc_di(mang_co, "D");
            if (ds.length === 0) { xu_ly_ket_thuc(false); return; }
            
            let best = null, max_score = -Infinity;
            ds.sort(() => Math.random() - 0.5);
            for(let n of ds) {
                let s = (mang_co[n.hd][n.cd] !== "") ? gia_tri_quan[mang_co[n.hd][n.cd].substring(2)] : 0;
                if(s > max_score) { max_score = s; best = n; }
            }
            
            mang_co[best.hd][best.cd] = mang_co[best.hg][best.cg];
            mang_co[best.hg][best.cg] = "";
            luot_di = "X";
            if (tim_moi_nuoc_di(mang_co, "X").length === 0) xu_ly_ket_thuc(true);
            ve_ban_co();
        }

        function xu_ly_ket_thuc(ai_thang) {
            game_over = true;
            document.getElementById("nut_reset").style.display = "block";
            document.getElementById("dong_chu_bao_cao").innerText = ai_thang ? "HẾT CỜ! NGỌC LÂM THẮNG" : "HẾT CỜ! BẠN ĐÃ CHIẾN THẮNG";
        }

        // ==========================================
        // KHỐI 4: VẼ GIAO DIỆN CHUẨN XÁC
        // ==========================================
        function ve_ban_co() {
            let v = document.getElementById("vung_ve_hinh");
            v.innerHTML = "";

            let svg = `<svg class="duong_ke_vec_to" width="540" height="600">
                <defs><filter id="f_chu" x="0" y="0" width="150%" height="150%"><feOffset result="off" in="SourceAlpha" dx="2" dy="2" /><feGaussianBlur result="blur" in="off" stdDeviation="1.5" /><feBlend in="SourceGraphic" in2="blur" mode="normal" /></filter></defs>
                <rect x="25" y="25" width="490" height="550" fill="none" stroke="#000" stroke-width="4"/>
                <rect x="30" y="30" width="480" height="540" fill="none" stroke="#000" stroke-width="2"/>`;
            
            for(let i=0; i<10; i++) svg += `<line x1="30" y1="${30+i*60}" x2="510" y2="${30+i*60}" stroke="#000" stroke-width="1.5"/>`;
            for(let i=0; i<9; i++) {
                let x = 30+i*60;
                if(i===0 || i===8) svg += `<line x1="${x}" y1="30" x2="${x}" y2="570" stroke="#000" stroke-width="1.5"/>`;
                else { svg += `<line x1="${x}" y1="30" x2="${x}" y2="270" stroke="#000" stroke-width="1.5"/>`; svg += `<line x1="${x}" y1="330" x2="${x}" y2="570" stroke="#000" stroke-width="1.5"/>`; }
            }
            svg += `<path d="M 210 30 L 330 150 M 330 30 L 210 150 M 210 450 L 330 570 M 330 450 L 210 570" stroke="#000" stroke-width="1.5" />`;
            
            [[2,1],[2,7],[7,1],[7,7],[3,0],[3,2],[3,4],[3,6],[3,8],[6,0],[6,2],[6,4],[6,6],[6,8]].forEach(p => {
                let x = 30+p[1]*60, y = 30+p[0]*60, d=6, l=12;
                if(p[1]>0) svg += `<polyline points="${x-d-l},${y-d} ${x-d},${y-d} ${x-d},${y-d-l}" fill="none" stroke="#000" stroke-width="1.5"/> <polyline points="${x-d-l},${y+d} ${x-d},${y+d} ${x-d},${y+d+l}" fill="none" stroke="#000" stroke-width="1.5"/>`;
                if(p[1]<8) svg += `<polyline points="${x+d+l},${y-d} ${x+d},${y-d} ${x+d},${y-d-l}" fill="none" stroke="#000" stroke-width="1.5"/> <polyline points="${x+d+l},${y+d} ${x+d},${y+d} ${x+d},${y+d+l}" fill="none" stroke="#000" stroke-width="1.5"/>`;
            });

            // CĂN GIỮA TUYỆT ĐỐI CHỮ TRONG LÒNG SÔNG
            svg += `<text x="270" y="306" font-size="34" font-family="'Times New Roman', serif" font-weight="bold" text-anchor="middle" dominant-baseline="central" letter-spacing="12" fill="#2c3e50" filter="url(#f_chu)">NGỌC LÂM THÁCH ĐẤU</text></svg>`;
            v.insertAdjacentHTML('beforeend', svg);

            for(let h=0; h<10; h++) for(let c=0; c<9; c++) {
                let o = document.createElement("div"); o.className = "o_vuong_nho";
                o.onclick = () => xu_ly_click(h, c);
                let q = mang_co[h][c];
                if(q !== "") {
                    let hinh = document.createElement("div");
                    hinh.className = "cuc_tron_co " + (q.startsWith("X") ? "phe_den" : "phe_do");
                    hinh.innerText = tu_dien_chu_han[q];
                    if(h === h_chon && c === c_chon) hinh.classList.add("dang_duoc_chon");
                    o.appendChild(hinh);
                }
                v.appendChild(o);
            }
            if(!game_over) document.getElementById("dong_chu_bao_cao").innerText = luot_di==="X" ? "Lượt của: Người chơi (Đen)" : "Lượt của: AI (Đang suy nghĩ...)";
        }

        function xu_ly_click(h, c) {
            if(luot_di !== "X" || game_over) return;
            let q = mang_co[h][c];
            if(h_chon === -1) {
                if(q.startsWith("X")) { h_chon = h; c_chon = c; ve_ban_co(); }
            } else {
                if(h === h_chon && c === c_chon) { h_chon = -1; c_chon = -1; ve_ban_co(); return; }
                if(q.startsWith("X")) { h_chon = h; c_chon = c; ve_ban_co(); return; }
                
                if(nuoc_di_hop_le(mang_co, h_chon, c_chon, h, c, "X")) {
                    mang_co[h][c] = mang_co[h_chon][c_chon];
                    mang_co[h_chon][c_chon] = "";
                    h_chon = -1; c_chon = -1; luot_di = "D";
                    if(tim_moi_nuoc_di(mang_co, "D").length === 0) xu_ly_ket_thuc(false);
                    ve_ban_co();
                    if(!game_over) setTimeout(ai_lam_viec, 500);
                }
            }
        }

        khoi_tao_lai();
    </script>
</body>
</html>
