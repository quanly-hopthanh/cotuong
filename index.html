<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Lưu Cờ Tướng - Ngọc Lâm Thách Đấu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
            margin-top: 20px;
        }
        .khung_bao_ngoai {
            background-color: #faf0e6; 
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-radius: 8px;
            border: 1px solid #8b4513;
        }
        .mat_phang_lon {
            display: grid;
            grid-template-columns: repeat(9, 60px);
            grid-template-rows: repeat(10, 60px);
            background-color: transparent;
            position: relative; 
            width: 540px;
            height: 600px;
        }
        .duong_ke_vec_to {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .o_vuong_nho {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 1; 
        }
        /* PHONG CÁCH QUÂN CỜ CÁCH ĐIỆU */
        .cuc_tron_co {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 28px;
            font-family: "SimSun", "HanWangYen", serif;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.5);
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        /* Nền Đen chữ Trắng cho Người chơi */
        .phe_den { background-color: #1a1a1a; color: #ffffff; border: 2px solid #444; } 
        /* Nền Đỏ chữ Vàng cho AI */
        .phe_do { background-color: #cc0000; color: #ffd700; border: 2px solid #8b0000; } 
        
        .dang_duoc_chon { transform: scale(1.15); box-shadow: 0 0 20px #00ff00; border-color: #00ff00; }
        .khu_vuc_thong_bao { margin-bottom: 25px; font-size: 26px; font-weight: bold; color: #2c3e50; text-transform: uppercase; text-align: center; }
        
        #nut_lam_moi {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #nut_lam_moi:hover { background-color: #219150; }
    </style>
</head>
<body>

    <div class="khu_vuc_thong_bao" id="dong_chu_bao_cao">Lượt của: Người chơi (Đen)</div>
    
    <div class="khung_bao_ngoai">
        <div class="mat_phang_lon" id="vung_ve_hinh"></div>
    </div>
    
    <button id="nut_lam_moi" onclick="khoi_dong_lai()">Bắt đầu ván mới</button>

    <script>
        // ==========================================
        // KHỐI 1: CẤU HÌNH DỮ LIỆU CƠ SỞ
        // ==========================================
        const tu_dien_hien_thi = {
            "D_Xe": "俥", "D_Ma": "傌", "D_Tuong": "相", "D_Si": "仕", "D_Vua": "帥", "D_Phao": "炮", "D_Tot": "兵",
            "X_Xe": "車", "X_Ma": "馬", "X_Tuong": "象", "X_Si": "士", "X_Vua": "將", "X_Phao": "砲", "X_Tot": "卒"
        };

        const gia_tri_quan_co = { "Xe": 900, "Phao": 450, "Ma": 400, "Tuong": 200, "Si": 200, "Tot": 100, "Vua": 10000 };

        let mang_du_lieu_ban_co = [];
        let luot_di_hien_tai = "X"; 
        let muc_tieu_hang = -1, muc_tieu_cot = -1;
        let trang_thai_ket_thuc = false;

        function khoi_dong_lai() {
            mang_du_lieu_ban_co = [
                ["D_Xe", "D_Ma", "D_Tuong", "D_Si", "D_Vua", "D_Si", "D_Tuong", "D_Ma", "D_Xe"],
                ["", "", "", "", "", "", "", "", ""],
                ["", "D_Phao", "", "", "", "", "", "D_Phao", ""],
                ["D_Tot", "", "D_Tot", "", "D_Tot", "", "D_Tot", "", "D_Tot"],
                ["", "", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", "", ""],
                ["X_Tot", "", "X_Tot", "", "X_Tot", "", "X_Tot", "", "X_Tot"],
                ["", "X_Phao", "", "", "", "", "", "X_Phao", ""],
                ["", "", "", "", "", "", "", "", ""],
                ["X_Xe", "X_Ma", "X_Tuong", "X_Si", "X_Vua", "X_Si", "X_Tuong", "X_Ma", "X_Xe"]
            ];
            luot_di_hien_tai = "X";
            trang_thai_ket_thuc = false;
            muc_tieu_hang = -1; muc_tieu_cot = -1;
            document.getElementById("nut_lam_moi").style.display = "none";
            cap_nhat_giao_dien();
        }

        // ==========================================
        // KHỐI 2: LOGIC LUẬT CHƠI CHI TIẾT
        // ==========================================
        function dem_vat_can_duong_thang(ban_co, h1, c1, h2, c2) {
            let dem = 0;
            if (h1 === h2) {
                for (let c = Math.min(c1, c2) + 1; c < Math.max(c1, c2); c++) if (ban_co[h1][c] !== "") dem++;
            } else if (c1 === c2) {
                for (let h = Math.min(h1, h2) + 1; h < Math.max(h1, h2); h++) if (ban_co[h][c1] !== "") dem++;
            }
            return dem;
        }

        function xet_duong_di_hop_le(ban_co, hg, cg, hd, cd, phe) {
            let q_goc = ban_co[hg][cg];
            let q_dich = ban_co[hd][cd];
            if (hg === hd && cg === cd) return false;
            if (q_dich !== "" && q_dich.startsWith(phe)) return false;

            let loai = q_goc.substring(2);
            let kh = Math.abs(hd - hg);
            let kc = Math.abs(cd - cg);

            switch(loai) {
                case "Xe": return (kh === 0 || kc === 0) && dem_vat_can_duong_thang(ban_co, hg, cg, hd, cd) === 0;
                case "Phao": 
                    let vc = dem_vat_can_duong_thang(ban_co, hg, cg, hd, cd);
                    return (kh === 0 || kc === 0) && ((q_dich === "" && vc === 0) || (q_dich !== "" && vc === 1));
                case "Ma":
                    if (kh === 2 && kc === 1 && ban_co[hg + (hd-hg)/2][cg] === "") return true;
                    if (kh === 1 && kc === 2 && ban_co[hg][cg + (cd-cg)/2] === "") return true;
                    return false;
                case "Tuong":
                    if (kh === 2 && kc === 2) {
                        if ((phe === "X" && hd < 5) || (phe === "D" && hd > 4)) return false;
                        return ban_co[hg + (hd-hg)/2][cg + (cd-cg)/2] === "";
                    }
                    return false;
                case "Si": return kh === 1 && kc === 1 && cd >= 3 && cd <= 5 && ((phe === "X" && hd >= 7) || (phe === "D" && hd <= 2));
                case "Vua": return (kh + kc === 1) && cd >= 3 && cd <= 5 && ((phe === "X" && hd >= 7) || (phe === "D" && hd <= 2));
                case "Tot":
                    let tien = (phe === "X") ? -1 : 1;
                    if (hd - hg === tien && kc === 0) return true;
                    let da_qua_song = (phe === "X") ? (hg <= 4) : (hg >= 5);
                    return da_qua_song && kh === 0 && kc === 1;
                default: return false;
            }
        }

        function xet_lo_mat_vua(ban_co) {
            let hd = -1, cd = -1, hx = -1, cx = -1;
            for (let h = 0; h < 10; h++) {
                for (let c = 3; c <= 5; c++) {
                    if (ban_co[h][c] === "D_Vua") { hd = h; cd = c; }
                    if (ban_co[h][c] === "X_Vua") { hx = h; cx = c; }
                }
            }
            if (cd === cx && cd !== -1) {
                let dem = 0;
                for (let h = hd + 1; h < hx; h++) if (ban_co[h][cd] !== "") dem++;
                return dem === 0;
            }
            return false;
        }

        function lay_buoc_di_an_toan(ban_co, hg, cg, hd, cd, phe) {
            if (!xet_duong_di_hop_le(ban_co, hg, cg, hd, cd, phe)) return false;
            let gia_lap = JSON.parse(JSON.stringify(ban_co));
            gia_lap[hd][cd] = gia_lap[hg][cg]; gia_lap[hg][cg] = "";
            if (xet_lo_mat_vua(gia_lap)) return false;
            
            let phe_dich = (phe === "X") ? "D" : "X";
            let hv = -1, cv = -1;
            for(let h=0; h<10; h++) for(let c=0; c<9; c++) if(gia_lap[h][c] === phe+"_Vua") { hv=h; cv=c; }
            for(let h=0; h<10; h++) for(let c=0; c<9; c++) if(gia_lap[h][c].startsWith(phe_dich)) 
                if(xet_duong_di_hop_le(gia_lap, h, c, hv, cv, phe_dich)) return false;
            return true;
        }

        function quet_toan_bo_nuoc_di(ban_co, phe) {
            let ds = [];
            for(let hg=0; hg<10; hg++) for(let cg=0; cg<9; cg++) if(ban_co[hg][cg].startsWith(phe))
                for(let hd=0; hd<10; hd++) for(let cd=0; cd<9; cd++) 
                    if(lay_buoc_di_an_toan(ban_co, hg, cg, hd, cd, phe)) ds.push({hg, cg, hd, cd});
            return ds;
        }

        // ==========================================
        // KHỐI 3: TRÍ TUỆ NHÂN TẠO (AI MINIMAX)
        // ==========================================
        function danh_gia_the_tran(ban_co) {
            let diem = 0;
            for(let h=0; h<10; h++) for(let c=0; c<9; c++) {
                let q = ban_co[h][c]; if(q === "") continue;
                let g = gia_tri_quan_co[q.substring(2)];
                diem += (q.startsWith("D")) ? g : -g;
            }
            return diem;
        }

        function ai_suy_nghi() {
            if (trang_thai_ket_thuc) return;
            let ds = quet_toan_bo_nuoc_di(mang_du_lieu_ban_co, "D");
            if (ds.length === 0) { ket_thuc_tran(false); return; }
            
            ds.sort(() => Math.random() - 0.5);
            let tot_nhat = null, diem_max = -Infinity;
            for(let nd of ds) {
                let ban_co_thu = JSON.parse(JSON.stringify(mang_du_lieu_ban_co));
                ban_co_thu[nd.hd][nd.cd] = ban_co_thu[nd.hg][nd.cg]; ban_co_thu[nd.hg][nd.cg] = "";
                let d = danh_gia_the_tran(ban_co_thu);
                if(d > diem_max) { diem_max = d; tot_nhat = nd; }
            }
            
            mang_du_lieu_ban_co[tot_nhat.hd][tot_nhat.cd] = mang_du_lieu_ban_co[tot_nhat.hg][tot_nhat.cg];
            mang_du_lieu_ban_co[tot_nhat.hg][tot_nhat.cg] = "";
            luot_di_hien_tai = "X";
            if (quet_toan_bo_nuoc_di(mang_du_lieu_ban_co, "X").length === 0) ket_thuc_tran(true);
            cap_nhat_giao_dien();
        }

        function ket_thuc_tran(ai_thang) {
            trang_thai_ket_thuc = true;
            document.getElementById("nut_lam_moi").style.display = "block";
            document.getElementById("dong_chu_bao_cao").innerText = ai_thang ? "HẾT CỜ! AI CHIẾN THẮNG" : "HẾT CỜ! BẠN CHIẾN THẮNG";
        }

        // ==========================================
        // KHỐI 4: GIAO DIỆN ĐỒ HỌA SVG & TƯƠNG TÁC
        // ==========================================
        function cap_nhat_giao_dien() {
            let vung = document.getElementById("vung_ve_hinh");
            vung.innerHTML = "";

            let svg = `<svg class="duong_ke_vec_to" width="540" height="600">
                <defs><filter id="f1" x="0" y="0" width="200%" height="200%"><feOffset result="offOut" in="SourceAlpha" dx="2" dy="2" /><feGaussianBlur result="blurOut" in="offOut" stdDeviation="2" /><feBlend in="SourceGraphic" in2="blurOut" mode="normal" /></filter></defs>
                <rect x="25" y="25" width="490" height="550" fill="none" stroke="#000" stroke-width="4"/>
                <rect x="30" y="30" width="480" height="540" fill="none" stroke="#000" stroke-width="2"/>`;
            
            for(let i=0; i<10; i++) svg += `<line x1="30" y1="${30+i*60}" x2="510" y2="${30+i*60}" stroke="#000" stroke-width="2"/>`;
            for(let i=0; i<9; i++) {
                let x = 30+i*60;
                if(i===0 || i===8) svg += `<line x1="${x}" y1="30" x2="${x}" y2="570" stroke="#000" stroke-width="2"/>`;
                else { svg += `<line x1="${x}" y1="30" x2="${x}" y2="270" stroke="#000" stroke-width="2"/>`; svg += `<line x1="${x}" y1="330" x2="${x}" y2="570" stroke="#000" stroke-width="2"/>`; }
            }
            svg += `<path d="M 210 30 L 330 150 M 330 30 L 210 150 M 210 450 L 330 570 M 330 450 L 210 570" stroke="#000" stroke-width="2" />`;
            
            [[2,1],[2,7],[7,1],[7,7],[3,0],[3,2],[3,4],[3,6],[3,8],[6,0],[6,2],[6,4],[6,6],[6,8]].forEach(vt => {
                let x = 30+vt[1]*60, y = 30+vt[0]*60, d=5, l=12;
                if(vt[1]>0) svg += `<polyline points="${x-d-l},${y-d} ${x-d},${y-d} ${x-d},${y-d-l}" fill="none" stroke="#000" stroke-width="2"/> <polyline points="${x-d-l},${y+d} ${x-d},${y+d} ${x-d},${y+d+l}" fill="none" stroke="#000" stroke-width="2"/>`;
                if(vt[1]<8) svg += `<polyline points="${x+d+l},${y-d} ${x+d},${y-d} ${x+d},${y-d-l}" fill="none" stroke="#000" stroke-width="2"/> <polyline points="${x+d+l},${y+d} ${x+d},${y+d} ${x+d},${y+d+l}" fill="none" stroke="#000" stroke-width="2"/>`;
            });

            svg += `<text x="270" y="308" font-size="30" font-family="'Times New Roman', serif" font-weight="bold" text-anchor="middle" letter-spacing="10" fill="#2c3e50" filter="url(#f1)">NGỌC LÂM THÁCH ĐẤU</text></svg>`;
            vung.insertAdjacentHTML('beforeend', svg);

            for(let h=0; h<10; h++) for(let c=0; c<9; c++) {
                let o = document.createElement("div"); o.className = "o_vuong_nho";
                o.onclick = () => xu_ly_bam_o(h, c);
                let q = mang_du_lieu_ban_co[h][c];
                if(q !== "") {
                    let hinh = document.createElement("div");
                    hinh.className = "cuc_tron_co " + (q.startsWith("X") ? "phe_den" : "phe_do");
                    hinh.innerText = tu_dien_hien_thi[q];
                    if(h === muc_tieu_hang && c === muc_tieu_cot) hinh.classList.add("dang_duoc_chon");
                    o.appendChild(hinh);
                }
                vung.appendChild(o);
            }
            if(!trang_thai_ket_thuc) document.getElementById("dong_chu_bao_cao").innerText = luot_di_hien_tai==="X" ? "Lượt của: Người chơi (Đen)" : "Lượt của: AI (Đang suy nghĩ...)";
        }

        function xu_ly_bam_o(h, c) {
            if(luot_di_hien_tai !== "X" || trang_thai_ket_thuc) return;
            let q = mang_du_lieu_ban_co[h][c];
            if(muc_tieu_hang === -1) {
                if(q.startsWith("X")) { muc_tieu_hang = h; muc_tieu_cot = c; cap_nhat_giao_dien(); }
            } else {
                if(h === muc_tieu_hang && c === muc_tieu_cot) { muc_tieu_hang = -1; muc_tieu_cot = -1; cap_nhat_giao_dien(); return; }
                if(q.startsWith("X")) { muc_tieu_hang = h; muc_tieu_cot = c; cap_nhat_giao_dien(); return; }
                
                if(lay_buoc_di_an_toan(mang_du_lieu_ban_co, muc_tieu_hang, muc_tieu_cot, h, c, "X")) {
                    mang_du_lieu_ban_co[h][c] = mang_du_lieu_ban_co[muc_tieu_hang][muc_tieu_cot];
                    mang_du_lieu_ban_co[muc_tieu_hang][muc_tieu_cot] = "";
                    muc_tieu_hang = -1; muc_tieu_cot = -1; luot_di_hien_tai = "D";
                    if(quet_toan_bo_nuoc_di(mang_du_lieu_ban_co, "D").length === 0) ket_thuc_tran(false);
                    cap_nhat_giao_dien();
                    if(!trang_thai_ket_thuc) setTimeout(ai_suy_nghi, 500);
                }
            }
        }

        khoi_dong_lai();
    </script>
</body>
</html>
