<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Lưu Cờ Tướng - Ngọc Lâm Thách Đấu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin-top: 20px;
        }
        .khung_bao_ngoai {
            background-color: #faf0e6; 
            padding: 25px;
            /* Tạo viền kép giống hình mẫu */
            border: 2px solid #000;
            outline: 6px solid #000;
            outline-offset: -10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
        }
        .mat_phang_lon {
            display: grid;
            grid-template-columns: repeat(9, 60px);
            grid-template-rows: repeat(10, 60px);
            background-color: transparent;
            border: 2px solid #000;
            position: relative; 
        }
        .o_vuong_nho {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }
        /* Tạo đường kẻ ngang dọc cho bàn cờ (màu đen sắc nét) */
        .o_vuong_nho::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: #000;
            z-index: 1;
        }
        .o_vuong_nho::after {
            content: "";
            position: absolute;
            height: 100%;
            width: 2px;
            background-color: #000;
            z-index: 1;
        }
        
        /* Vẽ Hán cung và các đường chéo */
        .han_cung {
            position: absolute;
            width: 180px;
            height: 180px;
            z-index: 0;
        }
        .han_cung_do { top: 0; left: 180px; }
        .han_cung_xanh { bottom: 0; left: 180px; }
        
        /* Đường chéo Hán cung */
        .duong_cheo {
            position: absolute;
            width: 254px; 
            height: 2px;
            background-color: #000;
            z-index: 0;
            transform-origin: top left;
        }
        .duong_cheo_1 { transform: rotate(45deg); top: 0; left: 180px; }
        .duong_cheo_2 { transform: rotate(-45deg); top: 180px; left: 180px; }
        .duong_cheo_3 { transform: rotate(45deg); bottom: 180px; left: 180px; }
        .duong_cheo_4 { transform: rotate(-45deg); bottom: 0; left: 180px; }

        /* Ký hiệu Hoa Thị (Dấu góc tại vị trí Pháo và Tốt) */
        .hoa_thi {
            position: absolute;
            width: 10px;
            height: 10px;
            border-color: #000;
            border-style: solid;
            border-width: 0;
            z-index: 1;
        }
        .ht_tl { bottom: 34px; right: 34px; border-bottom-width: 2px; border-right-width: 2px; }
        .ht_tr { bottom: 34px; left: 34px; border-bottom-width: 2px; border-left-width: 2px; }
        .ht_bl { top: 34px; right: 34px; border-top-width: 2px; border-right-width: 2px; }
        .ht_br { top: 34px; left: 34px; border-top-width: 2px; border-left-width: 2px; }

        /* Khu vực sông */
        .song_ngan_cach {
            grid-column: 1 / span 9;
            height: 60px;
            background-color: #faf0e6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 26px;
            color: #000;
            font-family: "Times New Roman", Times, serif;
            letter-spacing: 15px;
            text-transform: uppercase;
            z-index: 2;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
            /* Xóa đường kẻ dọc đi qua sông */
            position: relative;
        }
        .song_ngan_cach::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 56px;
            background-color: #faf0e6;
            z-index: -1;
        }

        /* Quân cờ chữ Hán */
        .cuc_tron_co {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 24px;
            font-family: "SimSun", "HanWangYen", serif;
            background-color: #fff;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            z-index: 3;
            user-select: none;
            position: relative;
        }
        
        .chu_mau_xanh { color: #000; border: 2px solid #000; } 
        .chu_mau_do { color: #dc143c; border: 2px solid #dc143c; } 
        
        .dang_duoc_chon { background-color: #ffff99; border-color: #ff8c00; box-shadow: 0 0 10px #ff8c00; }
        .khu_vuc_thong_bao { margin-bottom: 20px; font-size: 22px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="khu_vuc_thong_bao" id="dong_chu_bao_cao">Lượt của: Người chơi (Xanh)</div>
    
    <div class="khung_bao_ngoai">
        <div class="mat_phang_lon" id="vung_ve_hinh">
            </div>
    </div>

    <script>
        // ==========================================
        // KHỐI 1: CÁC BIẾN CƠ SỞ VÀ TRẠNG THÁI
        // ==========================================
        let tu_dien_chu = {
            "D_Xe": "俥", "D_Ma": "傌", "D_Tuong": "相", "D_Si": "仕", 
            "D_Tuong_C": "帥", "D_Phao": "炮", "D_Tot": "兵",
            "X_Xe": "車", "X_Ma": "馬", "X_Tuong": "象", "X_Si": "士", 
            "X_Tuong_C": "將", "X_Phao": "砲", "X_Tot": "卒"
        };

        let mang_luoi_chinh = [
            ["D_Xe", "D_Ma", "D_Tuong", "D_Si", "D_Tuong_C", "D_Si", "D_Tuong", "D_Ma", "D_Xe"],
            ["", "", "", "", "", "", "", "", ""],
            ["", "D_Phao", "", "", "", "", "", "D_Phao", ""],
            ["D_Tot", "", "D_Tot", "", "D_Tot", "", "D_Tot", "", "D_Tot"],
            ["", "", "", "", "", "", "", "", ""],
            ["", "", "", "", "", "", "", "", ""],
            ["X_Tot", "", "X_Tot", "", "X_Tot", "", "X_Tot", "", "X_Tot"],
            ["", "X_Phao", "", "", "", "", "", "X_Phao", ""],
            ["", "", "", "", "", "", "", "", ""],
            ["X_Xe", "X_Ma", "X_Tuong", "X_Si", "X_Tuong_C", "X_Si", "X_Tuong", "X_Ma", "X_Xe"]
        ];

        let nguoi_dang_cam_co = "X"; 
        let vi_tri_hang_chon = -1;
        let vi_tri_cot_chon = -1;

        // ==========================================
        // KHỐI 2: XỬ LÝ GIAO DIỆN BÀN CỜ (ĐÃ NÂNG CẤP HOA THỊ)
        // ==========================================
        function ve_lai_toan_bo() {
            let vung_chua = document.getElementById("vung_ve_hinh");
            vung_chua.innerHTML = ""; 

            // Vẽ cung chéo
            let duong_cheo_1 = document.createElement("div"); duong_cheo_1.className = "duong_cheo duong_cheo_1"; vung_chua.appendChild(duong_cheo_1);
            let duong_cheo_2 = document.createElement("div"); duong_cheo_2.className = "duong_cheo duong_cheo_2"; vung_chua.appendChild(duong_cheo_2);
            let duong_cheo_3 = document.createElement("div"); duong_cheo_3.className = "duong_cheo duong_cheo_3"; vung_chua.appendChild(duong_cheo_3);
            let duong_cheo_4 = document.createElement("div"); duong_cheo_4.className = "duong_cheo duong_cheo_4"; vung_chua.appendChild(duong_cheo_4);

            for (let hang = 0; hang < 10; hang++) {
                if (hang === 5) {
                    let dong_song = document.createElement("div");
                    dong_song.className = "song_ngan_cach";
                    dong_song.innerText = "Ngọc Lâm thách đấu";
                    vung_chua.appendChild(dong_song);
                }

                for (let cot = 0; cot < 9; cot++) {
                    let o_dat = document.createElement("div");
                    o_dat.className = "o_vuong_nho";
                    o_dat.onclick = function() { xu_ly_cham_tay(hang, cot); };

                    // Thêm các nét đứt (Hoa thị) tại vị trí quy chuẩn
                    let la_vi_tri_phao = (hang === 2 || hang === 7) && (cot === 1 || cot === 7);
                    let la_vi_tri_tot_giua = (hang === 3 || hang === 6) && (cot === 2 || cot === 4 || cot === 6);
                    let la_vi_tri_tot_bep_trai = (hang === 3 || hang === 6) && cot === 0;
                    let la_vi_tri_tot_bep_phai = (hang === 3 || hang === 6) && cot === 8;

                    // Vẽ nửa bên trái của hoa thị
                    if (la_vi_tri_phao || la_vi_tri_tot_giua || la_vi_tri_tot_bep_phai) {
                        let tl = document.createElement("div"); tl.className = "hoa_thi ht_tl"; o_dat.appendChild(tl);
                        let bl = document.createElement("div"); bl.className = "hoa_thi ht_bl"; o_dat.appendChild(bl);
                    }
                    // Vẽ nửa bên phải của hoa thị
                    if (la_vi_tri_phao || la_vi_tri_tot_giua || la_vi_tri_tot_bep_trai) {
                        let tr = document.createElement("div"); tr.className = "hoa_thi ht_tr"; o_dat.appendChild(tr);
                        let br = document.createElement("div"); br.className = "hoa_thi ht_br"; o_dat.appendChild(br);
                    }

                    // Đặt quân cờ
                    let gia_tri_o = mang_luoi_chinh[hang][cot];
                    if (gia_tri_o !== "") {
                        let cuc_hinh = document.createElement("div");
                        let phe_mau = gia_tri_o.split("_")[0]; 

                        cuc_hinh.className = "cuc_tron_co " + (phe_mau === "X" ? "chu_mau_xanh" : "chu_mau_do");
                        cuc_hinh.innerText = tu_dien_chu[gia_tri_o]; 

                        if (hang === vi_tri_hang_chon && cot === vi_tri_cot_chon) {
                            cuc_hinh.classList.add("dang_duoc_chon");
                        }
                        o_dat.appendChild(cuc_hinh);
                    }
                    vung_chua.appendChild(o_dat);
                }
            }

            let chu_bao = document.getElementById("dong_chu_bao_cao");
            chu_bao.innerText = nguoi_dang_cam_co === "X" ? "Lượt của: Người chơi (Xanh)" : "Lượt của: Máy tính (Đỏ đang suy nghĩ...)";
        }

        // ==========================================
        // KHỐI 3: LOGIC CHỌN VÀ DI CHUYỂN
        // ==========================================
        function xu_ly_cham_tay(hang_bam, cot_bam) {
            if (nguoi_dang_cam_co !== "X") return; 

            let gia_tri_dich = mang_luoi_chinh[hang_bam][cot_bam];

            if (vi_tri_hang_chon === -1) {
                if (gia_tri_dich.startsWith("X")) {
                    vi_tri_hang_chon = hang_bam;
                    vi_tri_cot_chon = cot_bam;
                    ve_lai_toan_bo();
                }
            } else {
                if (vi_tri_hang_chon === hang_bam && vi_tri_cot_chon === cot_bam) {
                    vi_tri_hang_chon = -1;
                    vi_tri_cot_chon = -1;
                    ve_lai_toan_bo();
                    return;
                }

                if (gia_tri_dich.startsWith("X")) {
                    vi_tri_hang_chon = hang_bam;
                    vi_tri_cot_chon = cot_bam;
                    ve_lai_toan_bo();
                    return;
                }

                mang_luoi_chinh[hang_bam][cot_bam] = mang_luoi_chinh[vi_tri_hang_chon][vi_tri_cot_chon];
                mang_luoi_chinh[vi_tri_hang_chon][vi_tri_cot_chon] = "";
                
                vi_tri_hang_chon = -1;
                vi_tri_cot_chon = -1;
                nguoi_dang_cam_co = "D";
                ve_lai_toan_bo();

                setTimeout(may_tu_dong_chay, 1000);
            }
        }

        // ==========================================
        // KHỐI 4: TRÍ TUỆ NHÂN TẠO CƠ BẢN
        // ==========================================
        function may_tu_dong_chay() {
            let danh_sach_quan_do = [];
            for (let h = 0; h < 10; h++) {
                for (let c = 0; c < 9; c++) {
                    if (mang_luoi_chinh[h][c].startsWith("D")) {
                        danh_sach_quan_do.push({ hang: h, cot: c });
                    }
                }
            }

            if (danh_sach_quan_do.length === 0) return; 

            let da_di_chuyen = false;
            let so_lan_thu = 0; 

            while (!da_di_chuyen && so_lan_thu < 100) {
                so_lan_thu++;
                let boc_ngau_nhien = danh_sach_quan_do[Math.floor(Math.random() * danh_sach_quan_do.length)];
                let h_goc = boc_ngau_nhien.hang;
                let c_goc = boc_ngau_nhien.cot;

                let cac_huong = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                let huong_ngau_nhien = cac_huong[Math.floor(Math.random() * cac_huong.length)];
                
                let h_moi = h_goc + huong_ngau_nhien[0];
                let c_moi = c_goc + huong_ngau_nhien[1];

                if (h_moi >= 0 && h_moi <= 9 && c_moi >= 0 && c_moi <= 8) {
                    if (!mang_luoi_chinh[h_moi][c_moi].startsWith("D")) {
                        mang_luoi_chinh[h_moi][c_moi] = mang_luoi_chinh[h_goc][c_goc];
                        mang_luoi_chinh[h_goc][c_goc] = "";
                        da_di_chuyen = true;
                    }
                }
            }

            nguoi_dang_cam_co = "X";
            ve_lai_toan_bo();
        }

        ve_lai_toan_bo();

    </script>
</body>
</html>
